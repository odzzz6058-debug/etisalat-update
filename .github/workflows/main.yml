name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# This is the permissions block – correct placement
permissions:
  contents: read
  pages: write
  id-token: write

# This is the concurrency block – it goes at the TOP LEVEL, not inside jobs
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # First job: build the site (upload artifact)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Upload artifact (entire root folder)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'  # This uploads everything from root – your index.html is here

  # Second job: deploy to Pages – MUST have environment block
  deploy:
    # This is the CRITICAL missing part – environment MUST be here
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build  # This job waits for 'build' to finish
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
